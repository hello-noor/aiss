<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Voce Cosmica</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600&family=Space+Mono&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #060912;
      --surface: rgba(255,255,255,0.04);
      --border: rgba(255,255,255,0.08);
      --violet: #7C3AED;
      --violet-soft: #A78BFA;
      --cyan: #22D3EE;
      --white: #F8FAFC;
      --muted: #94A3B8;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      background: var(--bg);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: 'Space Grotesk', sans-serif;
      color: var(--white);
      padding: 24px;
      overflow: hidden;
    }

    canvas#stars {
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
    }

    .container {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 480px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 28px;
    }

    /* ── Header ── */
    .header { text-align: center; }

    .eyebrow {
      font-family: 'Space Mono', monospace;
      font-size: 11px;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 6px;
    }

    .title {
      font-size: 30px;
      font-weight: 600;
      background: linear-gradient(130deg, var(--violet-soft) 20%, var(--cyan) 80%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      line-height: 1.15;
    }

    /* ── Orb ── */
    .orb-section {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 14px;
    }

    .orb-wrapper {
      position: relative;
      width: 180px;
      height: 180px;
    }

    .ring {
      position: absolute;
      border-radius: 50%;
      border: 1px solid rgba(167,139,250,0.35);
      width: 180px; height: 180px;
      top: 0; left: 0;
      transform: scale(1);
      opacity: 0;
      pointer-events: none;
    }

    .speaking .ring { animation: expand 2s ease-out infinite; }
    .speaking .ring:nth-child(2) { animation-delay: 0.55s; }
    .speaking .ring:nth-child(3) { animation-delay: 1.1s; }

    @keyframes expand {
      0%   { transform: scale(1);   opacity: 0.65; }
      100% { transform: scale(2.6); opacity: 0; }
    }

    .orb {
      width: 180px; height: 180px;
      border-radius: 50%;
      background: radial-gradient(circle at 33% 28%, #C4B5FD, #7C3AED 45%, #1E1B4B 82%);
      box-shadow:
        0 0 0 1px rgba(124,58,237,0.3),
        0 0 40px rgba(124,58,237,0.55),
        0 0 80px rgba(124,58,237,0.2),
        inset 0 0 28px rgba(196,181,253,0.12);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: transform 0.25s, box-shadow 0.25s;
      position: relative;
      overflow: hidden;
    }

    .orb::after {
      content: '';
      position: absolute;
      top: 10%; left: 14%;
      width: 32%; height: 22%;
      background: radial-gradient(circle, rgba(255,255,255,0.22), transparent);
      border-radius: 50%;
      pointer-events: none;
    }

    .orb:hover {
      transform: scale(1.04);
      box-shadow:
        0 0 0 1px rgba(124,58,237,0.5),
        0 0 55px rgba(124,58,237,0.7),
        0 0 110px rgba(124,58,237,0.3),
        inset 0 0 36px rgba(196,181,253,0.18);
    }

    /* Eyes */
    .eyes { display: flex; gap: 26px; align-items: center; }

    .eye {
      width: 16px; height: 16px;
      background: var(--cyan);
      border-radius: 50%;
      box-shadow: 0 0 12px var(--cyan);
      animation: blink 5s ease-in-out infinite;
    }
    .eye:nth-child(2) { animation-delay: 0.12s; }

    @keyframes blink {
      0%,88%,100% { transform: scaleY(1); }
      93% { transform: scaleY(0.06); }
    }

    /* Soundwave bars */
    .soundwave {
      display: none;
      gap: 5px;
      align-items: center;
      height: 46px;
    }

    .bar {
      width: 5px;
      background: var(--cyan);
      border-radius: 3px;
      box-shadow: 0 0 8px var(--cyan);
      height: 8px;
    }

    .bar:nth-child(1) { animation: wave 0.7s ease-in-out infinite 0.00s; }
    .bar:nth-child(2) { animation: wave 0.7s ease-in-out infinite 0.10s; }
    .bar:nth-child(3) { animation: wave 0.7s ease-in-out infinite 0.20s; }
    .bar:nth-child(4) { animation: wave 0.7s ease-in-out infinite 0.05s; }
    .bar:nth-child(5) { animation: wave 0.7s ease-in-out infinite 0.15s; }
    .bar:nth-child(6) { animation: wave 0.7s ease-in-out infinite 0.25s; }
    .bar:nth-child(7) { animation: wave 0.7s ease-in-out infinite 0.08s; }

    @keyframes wave {
      0%,100% { height: 8px; }
      50% { height: 38px; }
    }

    .speaking .eyes     { display: none; }
    .speaking .soundwave { display: flex; }

    /* Status */
    .status {
      font-family: 'Space Mono', monospace;
      font-size: 11px;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: var(--muted);
      transition: color 0.4s;
    }
    .status.active { color: var(--cyan); }

    /* Particles */
    .particle {
      position: fixed;
      border-radius: 50%;
      pointer-events: none;
      animation: float-up linear forwards;
    }
    @keyframes float-up {
      0%   { transform: translateY(0)     scale(1); opacity: 0.85; }
      100% { transform: translateY(-100px) scale(0); opacity: 0;   }
    }

    /* ── Text input ── */
    .input-section { width: 100%; }

    textarea {
      width: 100%;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      color: var(--white);
      font-family: 'Space Grotesk', sans-serif;
      font-size: 15px;
      line-height: 1.65;
      padding: 14px 16px;
      resize: none;
      outline: none;
      transition: border-color 0.2s;
      min-height: 90px;
    }
    textarea::placeholder { color: var(--muted); }
    textarea:focus { border-color: rgba(124,58,237,0.55); }

    /* Presets */
    .presets {
      display: flex;
      flex-wrap: wrap;
      gap: 7px;
      margin-top: 10px;
    }

    .preset-btn {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      color: var(--muted);
      font-size: 12px;
      font-family: 'Space Grotesk', sans-serif;
      padding: 5px 13px;
      cursor: pointer;
      transition: all 0.18s;
    }
    .preset-btn:hover {
      border-color: rgba(124,58,237,0.5);
      color: var(--violet-soft);
      background: rgba(124,58,237,0.1);
    }

    /* ── Controls ── */
    .controls { width: 100%; display: flex; flex-direction: column; gap: 11px; }

    .control-row {
      display: flex;
      gap: 12px;
      align-items: center;
    }

    .ctrl-label {
      font-family: 'Space Mono', monospace;
      font-size: 10px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted);
      min-width: 52px;
    }

    select {
      flex: 1;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--white);
      font-family: 'Space Grotesk', sans-serif;
      font-size: 13px;
      padding: 8px 10px;
      outline: none;
      cursor: pointer;
    }
    select option { background: #0D1117; }

    input[type="range"] {
      flex: 1;
      -webkit-appearance: none;
      height: 3px;
      background: var(--border);
      border-radius: 2px;
      outline: none;
    }
    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 14px; height: 14px;
      background: var(--violet-soft);
      border-radius: 50%;
      cursor: pointer;
      box-shadow: 0 0 8px rgba(167,139,250,0.6);
    }

    .range-val {
      font-family: 'Space Mono', monospace;
      font-size: 11px;
      color: var(--violet-soft);
      min-width: 28px;
      text-align: right;
    }

    /* ── Speak button ── */
    .speak-btn {
      width: 100%;
      border: none;
      border-radius: 12px;
      color: var(--white);
      font-family: 'Space Grotesk', sans-serif;
      font-size: 15px;
      font-weight: 600;
      padding: 15px;
      cursor: pointer;
      letter-spacing: 0.04em;
      transition: transform 0.15s, box-shadow 0.2s, background 0.3s;
      background: linear-gradient(135deg, #7C3AED, #4F46E5);
      box-shadow: 0 4px 22px rgba(124,58,237,0.45);
    }
    .speak-btn:hover {
      transform: translateY(-1px);
      box-shadow: 0 7px 32px rgba(124,58,237,0.65);
    }
    .speak-btn:active { transform: translateY(0); }
    .speak-btn.stop {
      background: linear-gradient(135deg, #DC2626, #9B1C1C);
      box-shadow: 0 4px 22px rgba(220,38,38,0.4);
    }
    .speak-btn.stop:hover {
      box-shadow: 0 7px 32px rgba(220,38,38,0.6);
    }

    /* Browser warning */
    .warning {
      background: rgba(245,158,11,0.1);
      border: 1px solid rgba(245,158,11,0.3);
      border-radius: 10px;
      color: #FCD34D;
      font-size: 13px;
      padding: 12px 16px;
      width: 100%;
      text-align: center;
      display: none;
    }
  </style>
</head>
<body>

<canvas id="stars"></canvas>

<div class="container">

  <div class="header">
    <p class="eyebrow">Artefatto Interattivo</p>
    <h1 class="title">Voce Cosmica</h1>
  </div>

  <!-- Orb -->
  <div class="orb-section">
    <div class="orb-wrapper" id="orbWrapper">
      <div class="ring"></div>
      <div class="ring"></div>
      <div class="ring"></div>
      <div class="orb" id="orb" title="Clicca per parlare">
        <div class="eyes">
          <div class="eye"></div>
          <div class="eye"></div>
        </div>
        <div class="soundwave">
          <div class="bar"></div>
          <div class="bar"></div>
          <div class="bar"></div>
          <div class="bar"></div>
          <div class="bar"></div>
          <div class="bar"></div>
          <div class="bar"></div>
        </div>
      </div>
    </div>
    <p class="status" id="statusText">In attesa…</p>
  </div>

  <!-- Text input -->
  <div class="input-section">
    <textarea id="textInput" rows="3" placeholder="Scrivi qualcosa da far dire all'artefatto…">Ciao! Sono un artefatto cosmico che può parlare. Dicci quello che vuoi sentire.</textarea>
    <div class="presets">
      <button class="preset-btn" data-text="Ciao a tutti! Sono l'artefatto cosmico, lieto di incontrarvi in questo angolo dell'universo digitale.">👋 Saluto</button>
      <button class="preset-btn" data-text="Nell'immensità del cosmo, ogni stella porta in sé il ricordo di miliardi di anni di luce e di silenzio eterno.">🌌 Cosmo</button>
      <button class="preset-btn" data-text="Bip boop. Analisi completata. Sistemi operativi al cento per cento. Sono pronto ad eseguire i vostri comandi, umani.">🤖 Robot</button>
      <button class="preset-btn" data-text="Come foglie nell'autunno cadono le parole, leggere e dorate, verso un suolo di silenzi profondi e dolci memorie.">🎵 Poesia</button>
      <button class="preset-btn" data-text="Attenzione, attenzione! Questo è un messaggio urgente dall'universo. Abbiate cura gli uni degli altri. Fine del messaggio.">📢 Annuncio</button>
    </div>
  </div>

  <div class="warning" id="warning">
    ⚠️ Il tuo browser non supporta la sintesi vocale. Prova con Chrome o Edge.
  </div>

  <!-- Controls -->
  <div class="controls">
    <div class="control-row">
      <span class="ctrl-label">Voce</span>
      <select id="voiceSelect"></select>
    </div>
    <div class="control-row">
      <span class="ctrl-label">Velocità</span>
      <input type="range" id="rateSlider" min="0.5" max="2" step="0.1" value="1">
      <span class="range-val" id="rateVal">1.0</span>
    </div>
    <div class="control-row">
      <span class="ctrl-label">Tono</span>
      <input type="range" id="pitchSlider" min="0.5" max="2" step="0.1" value="1">
      <span class="range-val" id="pitchVal">1.0</span>
    </div>
    <button class="speak-btn" id="speakBtn">▶&nbsp; Parla</button>
  </div>

</div>

<script>
  /* ── Stars ── */
  const canvas = document.getElementById('stars');
  const ctx = canvas.getContext('2d');

  function resizeCanvas() {
    canvas.width  = window.innerWidth;
    canvas.height = window.innerHeight;
  }
  resizeCanvas();
  window.addEventListener('resize', resizeCanvas);

  const STARS = Array.from({length: 130}, () => ({
    x: Math.random(),
    y: Math.random(),
    r: Math.random() * 1.4 + 0.3,
    phase: Math.random() * Math.PI * 2,
    speed: Math.random() * 0.006 + 0.002,
  }));

  (function animStars(t) {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    STARS.forEach(s => {
      const alpha = 0.25 + 0.65 * (0.5 + 0.5 * Math.sin(t * 0.001 * s.speed * 400 + s.phase));
      ctx.beginPath();
      ctx.arc(s.x * canvas.width, s.y * canvas.height, s.r, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(255,255,255,${alpha})`;
      ctx.fill();
    });
    requestAnimationFrame(animStars);
  })(0);

  /* ── Speech Synthesis ── */
  const synth = window.speechSynthesis;
  if (!synth) document.getElementById('warning').style.display = 'block';

  let voices = [];
  let isSpeaking = false;

  const orbWrapper = document.getElementById('orbWrapper');
  const statusText = document.getElementById('statusText');
  const speakBtn   = document.getElementById('speakBtn');
  const voiceSel   = document.getElementById('voiceSelect');
  const rateSlider = document.getElementById('rateSlider');
  const pitchSlider= document.getElementById('pitchSlider');
  const rateVal    = document.getElementById('rateVal');
  const pitchVal   = document.getElementById('pitchVal');
  const textInput  = document.getElementById('textInput');

  function loadVoices() {
    voices = synth ? synth.getVoices() : [];
    if (!voices.length) return;

    voiceSel.innerHTML = '';
    const sorted = [...voices].sort((a, b) => {
      const ai = a.lang.startsWith('it') ? 0 : a.lang.startsWith('en') ? 1 : 2;
      const bi = b.lang.startsWith('it') ? 0 : b.lang.startsWith('en') ? 1 : 2;
      return ai - bi;
    });

    sorted.forEach(v => {
      const opt = document.createElement('option');
      opt.value = v.name;
      opt.textContent = `${v.name} (${v.lang})`;
      voiceSel.appendChild(opt);
    });
  }

  loadVoices();
  if (synth && synth.onvoiceschanged !== undefined) {
    synth.onvoiceschanged = loadVoices;
  }

  rateSlider.addEventListener('input', () => {
    rateVal.textContent = parseFloat(rateSlider.value).toFixed(1);
  });
  pitchSlider.addEventListener('input', () => {
    pitchVal.textContent = parseFloat(pitchSlider.value).toFixed(1);
  });

  /* ── Speaking state ── */
  function setSpeaking(active) {
    isSpeaking = active;
    orbWrapper.classList.toggle('speaking', active);
    statusText.textContent = active ? 'Sto parlando…' : 'In attesa…';
    statusText.classList.toggle('active', active);
    speakBtn.textContent  = active ? '■  Ferma' : '▶  Parla';
    speakBtn.classList.toggle('stop', active);
    if (active) scheduleParticles();
  }

  /* ── Particles ── */
  function scheduleParticles() {
    if (!isSpeaking) return;
    spawnParticle();
    setTimeout(scheduleParticles, 120 + Math.random() * 130);
  }

  function spawnParticle() {
    const p = document.createElement('div');
    p.className = 'particle';

    const orbEl  = document.getElementById('orb');
    const rect   = orbEl.getBoundingClientRect();
    const cx     = rect.left + rect.width  / 2;
    const cy     = rect.top  + rect.height / 2;
    const angle  = Math.random() * Math.PI * 2;
    const radius = (rect.width / 2) * (0.4 + Math.random() * 0.6);
    const px     = cx + Math.cos(angle) * radius;
    const py     = cy + Math.sin(angle) * radius;

    const colors = ['#A78BFA','#22D3EE','#818CF8','#67E8F9'];
    const color  = colors[Math.floor(Math.random() * colors.length)];
    const size   = Math.random() * 5 + 2;
    const dur    = 700 + Math.random() * 600;

    p.style.cssText = `
      width:${size}px; height:${size}px;
      background:${color};
      box-shadow:0 0 ${size*2}px ${color};
      left:${px - size/2}px;
      top:${py - size/2}px;
      animation-duration:${dur}ms;
    `;
    document.body.appendChild(p);
    setTimeout(() => p.remove(), dur + 50);
  }

  /* ── Toggle speak ── */
  function toggleSpeak() {
    if (!synth) return;

    if (isSpeaking) {
      synth.cancel();
      setSpeaking(false);
      return;
    }

    const text = textInput.value.trim();
    if (!text) { textInput.focus(); return; }

    synth.cancel();

    const utter = new SpeechSynthesisUtterance(text);
    const selName = voiceSel.value;
    const voice = voices.find(v => v.name === selName);
    if (voice) utter.voice = voice;

    utter.rate  = parseFloat(rateSlider.value);
    utter.pitch = parseFloat(pitchSlider.value);
    utter.lang  = voice ? voice.lang : 'it-IT';

    utter.onstart = () => setSpeaking(true);
    utter.onend   = () => setSpeaking(false);
    utter.onerror = () => setSpeaking(false);

    synth.speak(utter);
  }

  speakBtn.addEventListener('click', toggleSpeak);
  document.getElementById('orb').addEventListener('click', toggleSpeak);

  /* ── Presets ── */
  document.querySelectorAll('.preset-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      textInput.value = btn.dataset.text;
      textInput.focus();
    });
  });

  /* ── Stop on page leave ── */
  window.addEventListener('beforeunload', () => synth && synth.cancel());
</script>
</body>
</html>
